<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Solo Snake Game</title>

<style>
body {
  margin: 0;
  background: #0a0a0a;
  color: white;
  font-family: 'Segoe UI', sans-serif;
}

.container {
  display: grid;
  grid-template-columns: 120px 1fr 250px;
  height: 100vh;
}

/* LEFT */
.sidebar {
  background: #111;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 20px;
  gap: 15px;
}

.color {
  width: 40px;
  height: 40px;
  border-radius: 50%;
}

/* CENTER */
.game-area {
  display: flex;
  justify-content: center;
  align-items: center;
}

canvas {
  background: #1a1a1a;
  box-shadow: 0 0 20px black;
}

/* RIGHT */
.panel {
  background: #111;
  padding: 20px;
}

.score {
  font-size: 40px;
  text-align: center;
}

.btn {
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #00ffcc;
  color: black;
  cursor: pointer;
  width: 100%;
  margin-top: 10px;
}

/* BACK */
.back {
  position: absolute;
  top: 15px;
  left: 15px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="back" onclick="location.href='../index.html'">⬅ Back</div>

<div class="container">

  <!-- LEFT -->
  <div class="sidebar">
    <div class="color" style="background:#ccc"></div>
    <div class="color" style="background:#2196f3"></div>
    <div class="color" style="background:#4caf50"></div>
    <div class="color" style="background:#ff5722"></div>
  </div>

  <!-- CENTER -->
  <div class="game-area">
    <canvas width="400" height="400"></canvas>
  </div>

  <!-- RIGHT -->
  <div class="panel">
    <h3>Score</h3>
    <div id="score" class="score">0</div>

    <button class="btn" onclick="location.reload()">🔄 Restart</button>

    <h4>Controls</h4>
    <p>⬆ Up</p>
    <p>⬇ Down</p>
    <p>⬅ Left</p>
    <p>➡ Right</p>
  </div>

</div>

<!-- ✅ IMPORTANT LINE -->
<script src="../js/solo.js"></script>

</body>
</html>
