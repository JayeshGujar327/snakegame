<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake Game</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  overflow: hidden;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 🔥 Animated background */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, #00ffcc33, transparent 60%);
  animation: moveBg 10s linear infinite;
}

@keyframes moveBg {
  0% { transform: translate(-25%, -25%); }
  50% { transform: translate(-35%, -35%); }
  100% { transform: translate(-25%, -25%); }
}

/* 🎮 Glass Card */
.container {
  position: relative;
  z-index: 1;
  width: 350px;
  padding: 40px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  box-shadow: 0 0 40px rgba(0,255,200,0.2);
  text-align: center;
  animation: fadeIn 1s ease;
}

h1 {
  font-size: 48px;
  color: white;
  margin-bottom: 10px;
  text-shadow: 0 0 20px #00ffcc;
}

.subtitle {
  color: #aaa;
  margin-bottom: 25px;
}

/* 🎯 Buttons */
.btn {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #2c2c2c, #1a1a1a);
  color: white;
  font-size: 16px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: 0.3s;
}

.btn:hover {
  background: #00ffcc;
  color: black;
  transform: scale(1.05);
  box-shadow: 0 0 20px #00ffcc;
}

.btn:active {
  transform: scale(0.95);
}

/* Ripple effect */
.btn::after {
  content: "";
  position: absolute;
  width: 0;
  height: 0;
  background: rgba(255,255,255,0.5);
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  transition: 0.4s;
}

.btn:active::after {
  width: 300px;
  height: 300px;
}

/* Footer */
footer {
  margin-top: 20px;
  font-size: 12px;
  color: #777;
}

/* Fade animation */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px);}
  to { opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">
  <h1>SNAKE</h1>
  <p class="subtitle">Multiplayer Arcade Experience</p>

  <button class="btn" onclick="go('game/solo.html')">🎮 Solo Mode</button>
  <button class="btn" onclick="go('game/multiplayer.html')">🌐 Multiplayer</button>
  <button class="btn" onclick="go('credits/credits.html')">📜 Credits</button>

  <footer>Version 2.0</footer>
</div>

<script>
function go(page) {
  document.body.style.opacity = "0";
  setTimeout(() => {
    window.location.href = page;
  }, 300);
}
</script>

</body>
</html>
